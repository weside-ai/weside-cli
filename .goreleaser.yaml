version: 2

builds:
  - binary: weside
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/weside-ai/weside-cli/cmd.version={{.Version}}
      - -X github.com/weside-ai/weside-cli/cmd.commit={{.Commit}}
      - -X github.com/weside-ai/weside-cli/cmd.date={{.Date}}

archives:
  - format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: weside-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://weside.ai"
    description: "CLI for the weside.ai AI Companion Platform"
    license: "Apache-2.0"
    binaries: [weside]
    # homepage (weside.ai) differs from the github.com download domain — keeps `brew audit` quiet
    url:
      verified: "github.com/weside-ai/weside-cli/"
    # binary is not signed/notarized → strip the macOS quarantine flag so it runs without a Gatekeeper prompt
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/weside"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
