linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - gofumpt
    - misspell
    - gosec
    - errorlint
    - nolintlint
    - revive

linters-settings:
  gofumpt:
    extra-rules: true
  gocritic:
    enabled-tags: [diagnostic, style, performance]
  gosec:
    excludes: [G104]

run:
  timeout: 5m

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
