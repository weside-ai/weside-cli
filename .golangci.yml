version: "2"

formatters:
  enable:
    - gofumpt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec
    - errorlint
    - nolintlint
    - revive
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
    gocritic:
      enabled-tags: [diagnostic, style, performance]
    gosec:
      excludes:
        - G104
        - G117
        - G204
        - G304
        - G705

run:
  timeout: 5m
