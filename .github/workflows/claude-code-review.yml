name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - "!CLAUDE.md"
      - "!**/CLAUDE.md"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !(github.event_name == 'pull_request' && (startsWith(github.head_ref, 'dependabot/') || startsWith(github.head_ref, 'renovate/'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Clean Claude Code lock files
        run: rm -rf ~/.local/state/claude/locks

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}
            EVENT: ${{ github.event.action }}

            Review this PR. The branch is already checked out.
            If EVENT is "synchronize": do a delta review vs previous comments.

            Focus: BLOCKING (security, logic bugs), WARNING (perf, error handling), SUGGESTION (style).
            This is a Go CLI. Check error wrapping, timeouts, auth token handling, test coverage.
            Use CLAUDE.md for project guidance.
            Post ONE comment via `gh pr comment`. End with verdict:
            <!-- VERDICT:BLOCKING/WARNING/PASS -->

          claude_args: "--allowedTools Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"

      - name: Check for blocking issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_OUTCOME: ${{ steps.claude-review.outcome }}
        run: |
          LATEST_CLAUDE_COMMENT=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '[.comments[] | select(.author.login == "claude")] | last | .body // ""')

          if [ "$REVIEW_OUTCOME" = "failure" ]; then
            echo "Claude Code Review crashed - inconclusive"
            exit 0
          elif echo "$LATEST_CLAUDE_COMMENT" | grep -q "VERDICT:BLOCKING"; then
            echo "::error::Claude Code Review found BLOCKING issues!"
            exit 1
          elif echo "$LATEST_CLAUDE_COMMENT" | grep -q "VERDICT:WARNING"; then
            echo "::error::Claude Code Review found WARNING issues!"
            exit 1
          elif echo "$LATEST_CLAUDE_COMMENT" | grep -q "VERDICT:PASS"; then
            echo "Claude Code Review passed"
          else
            echo "No verdict found"
          fi

  # Bot PRs (dependabot/renovate) skip claude-review above. Since claude-review
  # is a required status check, set a passing commit status so those PRs aren't
  # blocked. No code review needed for dependency bumps.
  claude-review-bot-stub:
    if: github.event_name == 'pull_request' && (startsWith(github.head_ref, 'dependabot/') || startsWith(github.head_ref, 'renovate/'))
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Set claude-review status for bot PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=success \
            -f context=claude-review \
            -f description="Skipped for $HEAD_REF (dependency-only)"
