# CodeRabbit Gate — DISABLED 2026-06-09 across weside-ai org.
# Review gate now runs on Greptile + claude-review only.
# See coderabbit-gate.yml.disabled-2026-06-09 for the previous full workflow.
#
# Re-enable: delete this file (or restore the .disabled- snapshot).
# This stub reports `success` so any branch-protection check still
# pointing at `coderabbit-gate` keeps passing.

name: CodeRabbit Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created, deleted]
  pull_request_review:
    types: [submitted]

concurrency:
  group: coderabbit-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-coderabbit:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: CodeRabbit disabled — reporting success
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha;
            if (sha) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo,
                sha, state: 'success', context: 'coderabbit-gate',
                description: 'CodeRabbit disabled 2026-06-09 (weside-ai org-wide)',
              });
            }
            console.log('✅ CodeRabbit disabled — gate is a no-op');
