# CodeRabbit Gate — uses Commit Statuses API so the latest run always wins.
# Branch protection must require "coderabbit-gate" (status context), NOT "check-coderabbit" (job name).

name: CodeRabbit Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created, deleted]
  pull_request_review:
    types: [submitted]

concurrency:
  group: coderabbit-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-coderabbit:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check for unresolved CodeRabbit threads
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            const setStatus = (state, description) =>
              github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo,
                sha, state, context: 'coderabbit-gate', description,
              });

            await setStatus('pending', 'Checking CodeRabbit review threads...');

            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes { author { login } body path line }
                        }
                      }
                    }
                  }
                }
              }`, { owner: context.repo.owner, repo: context.repo.repo, pr: prNumber });

            const threads = repository.pullRequest.reviewThreads.nodes;
            const crThreads = threads.filter(t =>
              t.comments.nodes[0]?.author?.login?.toLowerCase().includes('coderabbit'));

            if (crThreads.length === 0) {
              console.log('✅ No CodeRabbit threads found');
              return setStatus('success', 'No CodeRabbit threads');
            }

            const unresolved = crThreads.filter(t => !t.isResolved);
            const sevPattern = /_(🔴|🟠)\s*(Critical|Major)_|🔴\s*Critical|🟠\s*Major/;
            const major = unresolved.filter(t => sevPattern.test(t.comments.nodes[0]?.body || ''));
            const minor = unresolved.filter(t => !sevPattern.test(t.comments.nodes[0]?.body || ''));

            console.log(`CodeRabbit: ${crThreads.length} total, ${unresolved.length} unresolved (${major.length} major, ${minor.length} minor)`);

            if (major.length > 0) {
              major.forEach(t => {
                const c = t.comments.nodes[0];
                console.log(`  ❌ ${c?.path}:${c?.line}: ${(c?.body || '').substring(0, 120)}...`);
              });
              await setStatus('failure', `${major.length} unresolved Major/Critical thread(s)`);
              core.setFailed(`❌ ${major.length} unresolved CRITICAL/MAJOR CodeRabbit thread(s)`);
            } else {
              const desc = minor.length > 0
                ? `${minor.length} Minor thread(s) (non-blocking)`
                : 'All CodeRabbit threads resolved';
              console.log(`✅ ${desc}`);
              await setStatus('success', desc);
            }
