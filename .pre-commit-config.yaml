repos:
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-fumpt
      - id: go-build-repo-mod
      - id: go-test-repo-mod

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

# Note: golangci-lint is NOT in pre-commit because it runs per-file
# which causes typecheck errors (can't resolve cross-file references).
# Lint is enforced via: make lint (local) + CI workflow (remote).
